<div class="sidebar-header">
    <div class="sidebar-header-row">
        <a href="{{ "/" | relURL }}" class="logo-link">
            <img src="{{ "pagefind.svg" | relURL }}" alt="Pagefind" class="logo-img logo-light" />
            <img src="{{ "pagefind-dark.svg" | relURL }}" alt="" class="logo-img logo-dark" aria-hidden="true" />
        </a>
        <div class="sidebar-header-icons desktop-only">
            <a href="{{ .Site.Data.nav.github_url }}" class="icon-btn" aria-label="GitHub" target="_blank" rel="noopener">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
                <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 0 24 24" width="20px" fill="currentColor" aria-hidden="true">
                    <path d="M0 0h24v24H0V0z" fill="none"/>
                    <path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zm-2 5.79V18h-3.52L12 20.48 9.52 18H6v-3.52L3.52 12 6 9.52V6h3.52L12 3.52 14.48 6H18v3.52L20.48 12 18 14.48zM12 6v12c3.31 0 6-2.69 6-6s-2.69-6-6-6z"/>
                </svg>
            </button>
        </div>
        <div class="mobile-header-icons">
            <button class="icon-btn mobile-only" id="theme-toggle-mobile" aria-label="Toggle dark mode">
                <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 0 24 24" width="20px" fill="currentColor" aria-hidden="true">
                    <path d="M0 0h24v24H0V0z" fill="none"/>
                    <path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zm-2 5.79V18h-3.52L12 20.48 9.52 18H6v-3.52L3.52 12 6 9.52V6h3.52L12 3.52 14.48 6H18v3.52L20.48 12 18 14.48zM12 6v12c3.31 0 6-2.69 6-6s-2.69-6-6-6z"/>
                </svg>
            </button>
            <button class="menu-toggle icon-btn" aria-label="Menu" aria-expanded="false" aria-controls="mobile-nav">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>
    <div class="sidebar-version">{{ .Site.Data.nav.logo.version }}</div>
</div>

<div class="sidebar-search">
    <pagefind-modal-trigger></pagefind-modal-trigger>
    <pagefind-modal></pagefind-modal>
</div>

<nav class="sidebar-nav" aria-label="Documentation">
    {{- partial "nav-panels.html" . -}}
</nav>

<dialog class="mobile-nav" id="mobile-nav" aria-label="Navigation">
    {{- partial "nav-panels.html" . -}}
</dialog>
