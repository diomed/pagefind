app = 'pagefind-prod'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 200
    hard_limit = 1000

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
