name: Web Components Tests > Searchbox Escape cancels pending navigation while blocked on skeleton
steps:
  - step: I have the environment variable "PAGEFIND_SITE" set to "public"
  - step: I have a "public/index.html" file with the content {html}
    html: |-
      <!DOCTYPE html><html lang="en"><head>
      <link href="/pagefind/pagefind-component-ui.css" rel="stylesheet">
      </head><body>
      <pagefind-config preload></pagefind-config>
      <pagefind-searchbox></pagefind-searchbox>
      <script src="/pagefind/pagefind-component-ui.js" type="module"></script>
      </body></html>
  - step: I have a "public/one/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html lang="en"><head></head><body><h1>First Result</h1><p>Apple content here.</p></body></html>
  - step: I have a "public/two/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html lang="en"><head></head><body><h1>Second Result</h1><p>Apple content here too.</p></body></html>
  - step: I have a "public/three/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html lang="en"><head></head><body><h1>Third Result</h1><p>More apple content.</p></body></html>
  - macro: I run Pagefind
  - step: stdout should contain "Running Pagefind"
  - step: The file "public/pagefind/pagefind.js" should not be empty
  - step: I serve the directory "public"
  - step: In my browser, I load "/"
  - macro: I set up test gates on "pagefind-searchbox" blocking results "2"
  - step: In my browser, I click the selector "pagefind-searchbox input"
  - step: In my browser, I type "apple"
  - step: In my browser, I evaluate {js}
    js: |-
      let results = await toolproof.querySelector(".pf-searchbox-results");
      await toolproof.waitFor(
        () => results.querySelectorAll("a.pf-searchbox-result").length >= 2,
        "At least 2 results should load"
      );
      await toolproof.waitFor(
        () => document.querySelector('.pf-searchbox-results [data-pf-selected]'),
        "First result should be selected"
      );
  - step: In my browser, the console should be empty
  # Move to second result, then ArrowDown into skeleton
  - step: In my browser, I press the "ArrowDown" key
  - step: In my browser, I press the "ArrowDown" key
  - step: In my browser, I evaluate {js}
    js: |-
      let searchbox = document.querySelector("pagefind-searchbox");
      toolproof.assert(
        searchbox.pendingNavigation === 1,
        `Expected pendingNavigation=1, got ${searchbox.pendingNavigation}`
      );
  # Escape should cancel pending navigation and close dropdown
  - step: In my browser, I press the "Escape" key
  - step: In my browser, I evaluate {js}
    js: |-
      let searchbox = document.querySelector("pagefind-searchbox");
      let container = await toolproof.querySelector(".pf-searchbox");
      toolproof.assert(
        !container.classList.contains("open"),
        "Dropdown should be closed after Escape"
      );
      toolproof.assert(
        searchbox.pendingNavigation === 0,
        `Expected pendingNavigation=0 after Escape, got ${searchbox.pendingNavigation}`
      );
      let input = await toolproof.querySelector("pagefind-searchbox input");
      toolproof.assert(
        input.getAttribute("aria-expanded") === "false",
        "aria-expanded should be false"
      );
      toolproof.assert(
        !input.getAttribute("aria-activedescendant"),
        "aria-activedescendant should be cleared after Escape"
      );
