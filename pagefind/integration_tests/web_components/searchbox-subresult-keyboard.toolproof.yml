name: Web Components Tests > Searchbox keyboard navigates through sub-results
steps:
  - step: I have the environment variable "PAGEFIND_SITE" set to "public"
  - step: I have a "public/index.html" file with the content {html}
    html: |-
      <!DOCTYPE html><html lang="en"><head>
      <link href="/pagefind/pagefind-component-ui.css" rel="stylesheet">
      </head><body>
      <pagefind-config preload></pagefind-config>
      <pagefind-searchbox show-sub-results></pagefind-searchbox>
      <script src="/pagefind/pagefind-component-ui.js" type="module"></script>
      </body></html>
  - step: I have a "public/guide/index.html" file with the content {html}
    html: |-
      <!DOCTYPE html><html lang="en"><head></head><body>
      <h1>Apple Guide</h1>
      <p>Learn about apple varieties.</p>
      <h2 id="basic">Basic Apple</h2>
      <p>This section covers basic apple types.</p>
      <h2 id="advanced">Advanced Apple</h2>
      <p>This section covers advanced apple varieties.</p>
      </body></html>
  - step: I have a "public/simple/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html lang="en"><head></head><body><h1>Simple Apple Page</h1><p>More apple content here.</p></body></html>
  - macro: I run Pagefind
  - step: stdout should contain "Running Pagefind"
  - step: The file "public/pagefind/pagefind.js" should not be empty
  - step: I serve the directory "public"
  - step: In my browser, I load "/"
  - step: In my browser, I click the selector "pagefind-searchbox input"
  - step: In my browser, I type "apple"
  - step: In my browser, I evaluate {js}
    js: |-
      let results = await toolproof.querySelector(".pf-searchbox-results");
      await toolproof.waitFor(
        () => results.querySelectorAll('[role="option"]').length >= 4,
        "Should have at least 4 options (main results plus sub-results)"
      );
  - step: In my browser, the console should be empty
  # Results with sub-results should be wrapped in role="group" with an aria-label
  - step: In my browser, I evaluate {js}
    js: |-
      let listbox = await toolproof.querySelector('.pf-searchbox-results');
      let groups = listbox.querySelectorAll('[role="group"]');
      toolproof.assert(groups.length >= 1, "Should have at least one group for results with sub-results");
      for (let group of groups) {
        toolproof.assert(
          group.hasAttribute("aria-label"),
          "Each group should have an aria-label"
        );
        let options = group.querySelectorAll('[role="option"]');
        toolproof.assert(options.length >= 2, "Groups should contain main result plus sub-results");
      }
  # No options should have aria-setsize (count is communicated via aria-live announcements instead)
  - step: In my browser, I evaluate {js}
    js: |-
      let options = document.querySelectorAll('.pf-searchbox-results [role="option"]');
      for (let i = 0; i < options.length; i++) {
        toolproof.assert(
          !options[i].hasAttribute("aria-setsize"),
          `Option ${i} should not have aria-setsize`
        );
        toolproof.assert(
          !options[i].hasAttribute("aria-posinset"),
          `Option ${i} should not have aria-posinset`
        );
      }
  # First option should be selected initially
  - step: In my browser, I evaluate {js}
    js: |-
      let options = document.querySelectorAll('.pf-searchbox-results [role="option"]');
      toolproof.assert(options[0].hasAttribute("data-pf-selected"), "First option should be selected initially");
      toolproof.assert(options[0].getAttribute("aria-selected") === "true", "First option aria-selected should be true");
  # ArrowDown navigates to second option (first sub-result)
  - step: In my browser, I press the "ArrowDown" key
  - step: In my browser, I evaluate {js}
    js: |-
      let input = await toolproof.querySelector("pagefind-searchbox input");
      let options = document.querySelectorAll('.pf-searchbox-results [role="option"]');
      toolproof.assert(options[1].hasAttribute("data-pf-selected"), "Second option should be selected after ArrowDown");
      toolproof.assert(!options[0].hasAttribute("data-pf-selected"), "First option should not be selected");
      toolproof.assert(input.getAttribute("aria-activedescendant") === options[1].id, "aria-activedescendant should point to second option");
      toolproof.assert(document.activeElement === input, "Focus should remain on input");
  # ArrowDown through remaining sub-result to next main result
  - step: In my browser, I press the "ArrowDown" key
  - step: In my browser, I press the "ArrowDown" key
  - step: In my browser, I evaluate {js}
    js: |-
      let input = await toolproof.querySelector("pagefind-searchbox input");
      let options = document.querySelectorAll('.pf-searchbox-results [role="option"]');
      toolproof.assert(options[3].hasAttribute("data-pf-selected"), "Fourth option should be selected");
      toolproof.assert(input.getAttribute("aria-activedescendant") === options[3].id, "aria-activedescendant should point to fourth option");
  # ArrowUp navigates back through sub-results
  - step: In my browser, I press the "ArrowUp" key
  - step: In my browser, I evaluate {js}
    js: |-
      let options = document.querySelectorAll('.pf-searchbox-results [role="option"]');
      toolproof.assert(options[2].hasAttribute("data-pf-selected"), "Third option should be selected after ArrowUp");
  # Navigate all the way back to input
  - step: In my browser, I press the "ArrowUp" key
  - step: In my browser, I press the "ArrowUp" key
  - step: In my browser, I press the "ArrowUp" key
  - step: In my browser, I evaluate {js}
    js: |-
      let input = await toolproof.querySelector("pagefind-searchbox input");
      toolproof.assert(!input.getAttribute("aria-activedescendant"), "aria-activedescendant should be cleared when back in input");
      let selected = document.querySelectorAll('.pf-searchbox-results [role="option"][data-pf-selected]');
      toolproof.assert(selected.length === 0, "No options should be selected when back in input");
