name: Web Components Tests > Custom templates work correctly
steps:
  - step: I have the environment variable "PAGEFIND_SITE" set to "public"
  - step: I have a "public/index.html" file with the content {html}
    html: |-
      <!DOCTYPE html><html lang="en"><head>
      <link href="/pagefind/pagefind-component-ui.css" rel="stylesheet">
      </head><body>
      <pagefind-config preload></pagefind-config>
      <pagefind-input></pagefind-input>
      <pagefind-results>
        <script type="text/pagefind-template">
          <li class="custom-result">
            <h2 class="custom-title">{{ meta.title }}</h2>
            <a class="custom-link" href="{{ url }}">{{ url }}</a>
            <div class="custom-excerpt">{{+ excerpt +}}</div>
          </li>
        </script>
        <script type="text/pagefind-template" data-template="placeholder">
          <li class="custom-loading">Loading custom result...</li>
        </script>
      </pagefind-results>
      <script src="/pagefind/pagefind-component-ui.js" type="module"></script>
      </body></html>
  - step: I have a "public/first/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html
      lang="en"><head></head><body><h1>First Result</h1><p>This is the first
      result page. It has extra result content for result ranking.</p></body></html>
  - step: I have a "public/second/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html
      lang="en"><head></head><body><h1>Second Page</h1><p>This is the second
      result page.</p></body></html>
  - macro: I run Pagefind
  - step: stdout should contain "Running Pagefind"
  - step: The file "public/pagefind/pagefind.js" should not be empty
  - step: I serve the directory "public"
  - step: In my browser, I load "/"
  - step: In my browser, I click the selector "pagefind-input input"
  - step: In my browser, I type "result"
  - step: In my browser, the console should be empty
  - step: In my browser, I evaluate {js}
    js: |-
      let results = await toolproof.querySelector("pagefind-results ul");
      await toolproof.waitFor(() => results.querySelectorAll(".custom-result").length === 2);
  - snapshot: In my browser, the result of {js}
    js: |-
      let results = await toolproof.querySelector("pagefind-results ul");
      let items = [...results.querySelectorAll(".custom-result")];
      items.sort((a, b) => a.querySelector(".custom-title").textContent.localeCompare(b.querySelector(".custom-title").textContent));
      return items.map(el => el.outerHTML).join("");
    snapshot_content: |-
      ╎<li class="custom-result" data-pf-result-index="0">
      ╎      <h2 class="custom-title">First Result</h2>
      ╎      <a class="custom-link" href="/first/">/first/</a>
      ╎      <div class="custom-excerpt">First <mark>Result.</mark> This is the first <mark>result</mark> page. It has extra <mark>result</mark> content for <mark>result</mark> ranking.</div>
      ╎    </li><li class="custom-result" data-pf-result-index="1">
      ╎      <h2 class="custom-title">Second Page</h2>
      ╎      <a class="custom-link" href="/second/">/second/</a>
      ╎      <div class="custom-excerpt">Second Page. This is the second <mark>result</mark> page.</div>
      ╎    </li>
