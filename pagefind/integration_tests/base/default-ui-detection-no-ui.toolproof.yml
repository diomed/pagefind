name: Base Tests > Default UI detection does not trigger with no UI
steps:
  - ref: ./background.toolproof.yml
  - step: I have a "public/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html lang="en"><head></head><body>
      <p>Hello world</p>
      </body></html>
  - macro: I run Pagefind
  - step: stdout should not contain "Pagefind found references to the Default UI"
