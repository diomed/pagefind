name: URL tests > Subresult URLs use meta URL override
steps:
  - ref: ./background.toolproof.yml
  - step: I have a "public/page/index.html" file with the content {html}
    html: >-
      <!DOCTYPE html><html lang="en"><head></head><body
      data-pagefind-meta="url:https://example.com/custom-path"><p>Some
      introductory content about testing frameworks.</p><h2
      id="getting-started">Getting Started</h2><p>Here is how you get
      started with testing.</p><h2 id="advanced-usage">Advanced
      Usage</h2><p>Here is some advanced testing
      content.</p></body></html>
  - macro: I run Pagefind
  - step: stdout should contain "Running Pagefind"
  - step: The file "public/pagefind/pagefind.js" should not be empty
  - step: I serve the directory "public"
  - step: In my browser, I load "/"
  - step: In my browser, I evaluate {js}
    js: |-
      let pagefind = await import("/pagefind/pagefind.js");

      let search = await pagefind.search("testing");
      let data = await search.results[0].data();
      let urls = data.sub_results.map(r => r.url).join(" | ");
      document.querySelector('[data-url]').innerText = urls;
  - step: In my browser, the console should be empty
  - step: In my browser, I evaluate {js}
    js: |-
      let val = await toolproof.querySelector("[data-url]");
      toolproof.assert_eq(val.innerHTML, `https://example.com/custom-path | https://example.com/custom-path#getting-started | https://example.com/custom-path#advanced-usage`);
